<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>☕</text></svg>">
    <title>☕ Kávé Menü - Válassz!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Patrick+Hand&family=Caveat:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            overflow-x: hidden;
        }

        body {
            background: #0a0a0a;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            position: relative;
        }

        /* Cyberpunk háttér effekt */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                linear-gradient(45deg, rgba(255, 0, 255, 0.1) 0%, transparent 50%),
                linear-gradient(-45deg, rgba(0, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Neon grid háttér */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            padding-top: 10px;
            margin-bottom: 30px;
            border-bottom: 3px solid #ff00ff;
            box-shadow: 0 5px 20px rgba(255, 0, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 3em;
            font-weight: 900;
            background: linear-gradient(45deg, #ff00ff, #00ffff, #ff00ff);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 3s ease infinite;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
            margin-bottom: 10px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .subtitle {
            color: #00ffff;
            font-size: 1.1em;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        /* Kávé kártya */
        .coffee-card {
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid #ff00ff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }

        .coffee-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.6);
            border-color: #00ffff;
        }

        .coffee-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 0, 255, 0.1), transparent);
            transform: rotate(45deg);
            transition: all 0.5s;
            pointer-events: none;
        }

        .coffee-card:hover::before {
            left: 100%;
        }

        .coffee-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .coffee-icon {
            font-size: 2.5em;
            margin-right: 15px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 255, 0.8));
        }

        .coffee-title {
            flex: 1;
        }

        .coffee-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4em;
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
            margin-bottom: 5px;
        }

        .coffee-intensity {
            color: #00ffff;
            font-size: 0.9em;
        }

        .expand-icon {
            font-size: 1.5em;
            color: #00ffff;
            transition: transform 0.3s;
        }

        .coffee-card.expanded .expand-icon {
            transform: rotate(180deg);
        }

        .coffee-details {
            display: none;
        }

        .coffee-card.expanded .coffee-details {
            display: block;
        }

        .coffee-description {
            color: #aaa;
            line-height: 1.6;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 0, 255, 0.05);
            border-left: 3px solid #ff00ff;
        }

        /* Interaktív választók */
        .options-section {
            margin-top: 20px;
        }

        .option-group {
            margin-bottom: 15px;
        }

        .option-label {
            color: #00ffff;
            font-size: 0.9em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .option-btn {
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #ff00ff;
            color: #ff00ff;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9em;
            position: relative;
            overflow: hidden;
        }

        .option-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 0, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s;
        }

        .option-btn:hover {
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
            transform: scale(1.05);
        }

        .option-btn.selected {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
        }

        .custom-dropdown {
            position: relative;
            width: 100%;
        }
        .custom-dropdown-trigger {
            background: rgba(255, 0, 255, 0.1);
            border: 2px solid #ff00ff;
            color: #ff00ff;
            padding: 10px 40px 10px 15px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9em;
            width: 100%;
            text-align: left;
            position: relative;
            transition: all 0.3s;
            box-sizing: border-box;
        }
        .custom-dropdown-trigger::after {
            content: '▼';
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7em;
            transition: transform 0.3s;
        }
        .custom-dropdown.open .custom-dropdown-trigger::after {
            transform: translateY(-50%) rotate(180deg);
        }
        .custom-dropdown-trigger:hover {
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
        }
        .custom-dropdown.open .custom-dropdown-trigger {
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
            border-radius: 25px 25px 0 0;
        }
        .custom-dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a0a2e;
            border: 2px solid #ff00ff;
            border-top: 1px solid rgba(255, 0, 255, 0.3);
            border-radius: 0 0 15px 15px;
            z-index: 1000;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255, 0, 255, 0.3);
        }
        .custom-dropdown.open .custom-dropdown-menu {
            display: block;
        }
        .custom-dropdown-item {
            padding: 10px 15px;
            color: #ff00ff;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.9em;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(255, 0, 255, 0.1);
        }
        .custom-dropdown-item:last-child {
            border-bottom: none;
        }
        .custom-dropdown-item:hover {
            background: rgba(255, 0, 255, 0.2);
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
        }
        .custom-dropdown-item.selected {
            background: rgba(255, 0, 255, 0.3);
            font-weight: bold;
        }
        .flavor-sub-group {
            margin-top: 10px;
            padding-left: 15px;
            border-left: 2px solid rgba(255, 0, 255, 0.3);
        }
        .flavor-sub-label {
            color: #ff00ff;
            font-size: 0.8em;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.7;
        }

        .milk-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .order-summary {
            background: rgba(0, 255, 255, 0.1);
            border: 2px solid #00ffff;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .summary-title {
            color: #00ffff;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .summary-item {
            color: #fff;
            margin: 5px 0;
            padding-left: 10px;
            border-left: 2px solid #00ffff;
        }

        /* Név input */
        .name-input {
            width: 100%;
            padding: 12px 15px;
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffff;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            -webkit-appearance: none;
            touch-action: manipulation;
            position: relative;
            z-index: 10;
        }

        .name-input::placeholder {
            color: rgba(0, 255, 255, 0.4);
        }

        .name-input:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }

        /* Egyéb kérés textarea */
        .note-input {
            width: 100%;
            padding: 12px 15px;
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffff;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            border-radius: 10px;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            -webkit-appearance: none;
            touch-action: manipulation;
            position: relative;
            z-index: 10;
            resize: vertical;
            min-height: 60px;
        }

        .note-input::placeholder {
            color: rgba(0, 255, 255, 0.4);
        }

        .note-input:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.3);
        }

        /* Rendelés gomb */
        .order-btn {
            display: block;
            width: 100%;
            padding: 15px 30px;
            margin-top: 20px;
            background: linear-gradient(135deg, #ff00ff, #aa00ff);
            border: 2px solid #ff00ff;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1em;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
            position: relative;
            overflow: hidden;
        }

        .order-btn:hover {
            background: linear-gradient(135deg, #00ffff, #00aaff);
            border-color: #00ffff;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.8);
            transform: scale(1.02);
        }

        .order-btn:active {
            transform: scale(0.98);
        }

        .order-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .order-btn.sent {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border-color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            pointer-events: none;
        }

        /* ===== NÉZET VÁLTÓ ===== */
        .view-toggle-bar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
        }
        #viewModeBtn {
            background: rgba(0,255,255,0.08);
            border: 2px solid #00ffff;
            color: #00ffff;
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85em;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        #viewModeBtn:hover, #viewModeBtn.active {
            background: rgba(0,255,255,0.2);
            box-shadow: 0 0 15px rgba(0,255,255,0.5);
        }

        /* ===== ROLODEX MÓD ===== */
        #cardsContainer.rolodex-mode {
            position: relative;
            height: 300px;
            perspective: 900px;
            perspective-origin: 50% 50%;
            overflow: visible;
            margin-bottom: 100px;
        }
        #coffeeList.rolodex-mode {
            position: absolute;
            inset: 0;
            display: block !important;
            overflow: visible;
        }
        #coffeeList.rolodex-mode .coffee-card {
            position: absolute;
            left: 0;
            right: 0;
            width: 100%;
            box-sizing: border-box;
            margin: 0 !important;
            cursor: pointer;
            transition: transform 0.42s cubic-bezier(0.4,0,0.2,1),
                        opacity 0.42s ease,
                        box-shadow 0.3s;
            will-change: transform, opacity;
        }
        #coffeeList.rolodex-mode .coffee-card .coffee-details {
            display: none !important;
        }
        #coffeeList.rolodex-mode .coffee-card.rolodex-active {
            box-shadow: 0 0 40px rgba(0,255,255,0.5), 0 0 0 2px rgba(0,255,255,0.4);
        }
        /* Fade vignette a tetején és alján */
        #cardsContainer.rolodex-mode::before,
        #cardsContainer.rolodex-mode::after {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 70px;
            z-index: 30;
            pointer-events: none;
        }
        #cardsContainer.rolodex-mode::before {
            top: 0;
            background: linear-gradient(to bottom, #0a0a0a 0%, transparent 100%);
        }
        #cardsContainer.rolodex-mode::after {
            bottom: 0;
            background: linear-gradient(to top, #0a0a0a 0%, transparent 100%);
        }
        body.theme-doodle #cardsContainer.rolodex-mode::before {
            background: linear-gradient(to bottom, #3d3d3d 0%, transparent 100%);
        }
        body.theme-doodle #cardsContainer.rolodex-mode::after {
            background: linear-gradient(to top, #3d3d3d 0%, transparent 100%);
        }
        #coffeeList.rolodex-mode .coffee-card:not(.rolodex-active) .coffee-header {
            opacity: 0.9;
        }
        .rolodex-hint {
            text-align: center;
            color: rgba(0,255,255,0.45);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.78em;
            letter-spacing: 1px;
            pointer-events: none;
            margin-top: 12px;
        }
        .rolodex-counter {
            text-align: right;
            color: rgba(0,255,255,0.5);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8em;
            margin-top: 4px;
        }

        /* doodle theme */
        body.theme-doodle #viewModeBtn {
            background: rgba(126,205,192,0.08);
            border: 2px dashed #7ecdc0;
            color: #7ecdc0;
            font-family: 'Patrick Hand', cursive;
            font-size: 1em;
        }
        body.theme-doodle #viewModeBtn:hover,
        body.theme-doodle #viewModeBtn.active {
            background: rgba(126,205,192,0.2);
            box-shadow: 2px 2px 0 rgba(0,0,0,0.2);
        }
        body.theme-doodle #coffeeList.rolodex-mode .coffee-card.rolodex-active {
            box-shadow: 3px 3px 0 rgba(0,0,0,0.25), 0 0 0 3px #7ecdc0;
        }
        body.theme-doodle .rolodex-hint,
        body.theme-doodle .rolodex-counter {
            color: rgba(126,205,192,0.5);
            font-family: 'Patrick Hand', cursive;
        }

        /* Szűrők */
        .filters-section {
            background: rgba(20, 20, 20, 0.8);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .filters-title {
            font-family: 'Orbitron', sans-serif;
            color: #00ffff;
            font-size: 1.1em;
            margin-bottom: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .filters-title .expand-icon {
            font-size: 0.9em;
            transition: transform 0.3s;
        }

        .filters-section.expanded .filters-title .expand-icon {
            transform: rotate(180deg);
        }

        .filters-section.expanded .filters-title {
            margin-bottom: 15px;
        }

        .filters-content {
            display: none;
        }

        .filters-section.expanded .filters-content {
            display: block;
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-label {
            color: #ff00ff;
            font-size: 0.85em;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .filter-btn {
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85em;
        }

        .filter-btn:hover {
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
            transform: scale(1.05);
        }

        .filter-btn.active {
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
        }

        .coffee-card.hidden {
            display: none;
        }

        /* Tags */
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 15px;
        }

        .tag {
            background: rgba(0, 255, 255, 0.2);
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8em;
        }

        /* Reszponzív */
        @media (max-width: 600px) {
            h1 {
                font-size: 2em;
            }

            .coffee-name {
                font-size: 1.2em;
            }

            .option-btn {
                font-size: 0.8em;
                padding: 8px 15px;
            }

            .theme-toggle {
                padding: 5px 8px;
                gap: 4px;
                margin-bottom: 5px;
            }
            .theme-toggle-icon { font-size: 12px; }
            .theme-toggle-switch { width: 32px; height: 18px; }
            .theme-toggle-switch::after { width: 14px; height: 14px; }
            body.theme-doodle .theme-toggle-switch::after { transform: translateX(14px); }
        }

        /* Glitch effekt címhez */
        @keyframes glitch {
            0% {
                text-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
            }
            25% {
                text-shadow: -2px 0 rgba(255, 0, 255, 0.8), 2px 0 rgba(0, 255, 255, 0.8);
            }
            50% {
                text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            }
            75% {
                text-shadow: 2px 0 rgba(255, 0, 255, 0.8), -2px 0 rgba(0, 255, 255, 0.8);
            }
            100% {
                text-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
            }
        }

        h1:hover {
            animation: glitch 0.3s infinite;
        }

        /* ===== THEME TOGGLE ===== */
        .theme-toggle {
            display: flex;
            align-self: flex-end;
            margin-bottom: 5px;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.85);
            padding: 8px 14px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            user-select: none;
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        .theme-toggle:hover { border-color: rgba(255,255,255,0.5); }
        .theme-toggle-label { font-size: 12px; color: #aaa; font-family: 'Share Tech Mono', monospace; }
        .theme-toggle-switch {
            width: 44px; height: 24px;
            background: #ff00ff;
            border-radius: 12px;
            position: relative;
            transition: background 0.3s;
        }
        .theme-toggle-switch::after {
            content: '';
            width: 20px; height: 20px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px; left: 2px;
            transition: transform 0.3s;
        }
        .theme-toggle-icon { font-size: 16px; }

        /* ===== DOODLE THEME ===== */
        body.theme-doodle { background: #3d3d3d; font-family: 'Patrick Hand', cursive; }
        body.theme-doodle::before {
            background: none;
        }
        body.theme-doodle::after {
            background-image: none;
        }

        body.theme-doodle .theme-toggle {
            background: rgba(61,61,61,0.9);
            border-color: rgba(255,255,255,0.15);
        }
        body.theme-doodle .theme-toggle-switch {
            background: #7ecdc0;
        }
        body.theme-doodle .theme-toggle-switch::after {
            transform: translateX(20px);
        }

        body.theme-doodle header {
            border-bottom: 3px dashed #e88a7a;
            box-shadow: none;
        }
        body.theme-doodle h1 {
            font-family: 'Caveat', cursive;
            font-size: 3.2em;
            background: none;
            -webkit-background-clip: unset;
            -webkit-text-fill-color: #fff;
            text-shadow: 2px 2px 0 #e88a7a;
            animation: none;
        }

        /* ===== ADMIN UI ===== */

        /* PIN Modal */
        .pin-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pin-dialog {
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #ff00ff;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 40px rgba(255, 0, 255, 0.5);
            max-width: 350px;
            width: 90%;
        }

        .pin-title {
            font-family: 'Orbitron', sans-serif;
            color: #ff00ff;
            font-size: 1.5em;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
        }

        .pin-subtitle {
            color: #00ffff;
            margin-bottom: 25px;
        }

        .pin-input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid #00ffff;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            text-align: center;
            letter-spacing: 10px;
            border-radius: 10px;
            outline: none;
            -webkit-appearance: none;
        }

        .pin-input:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
        }

        .pin-error {
            color: #ff4444;
            margin-top: 10px;
            font-size: 0.9em;
            text-shadow: 0 0 5px rgba(255, 68, 68, 0.5);
        }

        .pin-submit-btn {
            width: 100%;
            margin-top: 20px;
            padding: 12px;
            background: linear-gradient(135deg, #ff00ff, #aa00ff);
            border: 2px solid #ff00ff;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1em;
            letter-spacing: 3px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.4);
            transition: all 0.3s;
        }

        .pin-submit-btn:hover {
            background: linear-gradient(135deg, #00ffff, #00aaff);
            border-color: #00ffff;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Admin Panel */
        .admin-toolbar {
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #00ffff;
            border-radius: 15px;
            padding: 15px 20px;
            margin-bottom: 25px;
            position: sticky;
            top: 10px;
            z-index: 100;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: center;
            justify-content: space-between;
        }

        .pat-section {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            min-width: 200px;
        }

        .pat-label {
            color: #00ffff;
            font-size: 0.85em;
            white-space: nowrap;
        }

        .pat-input {
            flex: 1;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffff;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 16px;
            border-radius: 8px;
            outline: none;
            -webkit-appearance: none;
        }

        .pat-input:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
        }

        .admin-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .change-count {
            color: #00ffff;
            font-size: 0.85em;
        }

        .save-btn {
            padding: 8px 25px;
            background: linear-gradient(135deg, #ff00ff, #aa00ff);
            border: 2px solid #ff00ff;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85em;
            letter-spacing: 2px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.4);
        }

        .save-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .save-btn:hover:not(:disabled) {
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
            transform: scale(1.05);
        }

        .save-btn.saving {
            background: linear-gradient(135deg, #ffaa00, #ff8800);
            border-color: #ffaa00;
        }

        .save-btn.saved {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border-color: #00ff88;
        }

        .save-btn.error {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border-color: #ff4444;
        }

        .back-btn {
            padding: 8px 15px;
            background: transparent;
            border: 1px solid #666;
            color: #888;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8em;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            border-color: #00ffff;
            color: #00ffff;
        }

        /* Admin Category & Capsule Rows */
        .admin-category {
            margin-bottom: 25px;
        }

        .admin-category-title {
            font-family: 'Orbitron', sans-serif;
            color: #00ffff;
            font-size: 1.1em;
            padding: 10px 15px;
            border-left: 4px solid #ff00ff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .admin-capsule-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: rgba(20, 20, 20, 0.6);
            border: 1px solid rgba(255, 0, 255, 0.2);
            border-radius: 8px;
            margin-bottom: 6px;
            transition: all 0.2s;
        }

        .admin-capsule-row:hover {
            border-color: rgba(255, 0, 255, 0.5);
            background: rgba(30, 30, 30, 0.8);
        }

        .admin-capsule-row.out-of-stock {
            opacity: 0.5;
        }

        .admin-capsule-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .admin-capsule-icon {
            font-size: 1.3em;
        }

        .admin-capsule-name {
            color: #fff;
            font-size: 0.95em;
        }

        .admin-capsule-size {
            color: #666;
            font-size: 0.8em;
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(100, 100, 100, 0.4);
            border: 1px solid #444;
            border-radius: 26px;
            transition: all 0.3s;
        }

        .toggle-slider::before {
            content: '';
            position: absolute;
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background: #888;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .toggle-switch input:checked + .toggle-slider {
            background: rgba(255, 0, 255, 0.3);
            border-color: #ff00ff;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.4);
        }

        .toggle-switch input:checked + .toggle-slider::before {
            transform: translateX(24px);
            background: #ff00ff;
        }

        /* Quantity Controls */
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            margin-right: 12px;
        }

        .quantity-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid #ff00ff;
            background: rgba(255, 0, 255, 0.1);
            color: #ff00ff;
            font-size: 16px;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            padding: 0;
            line-height: 1;
        }

        .quantity-btn:hover {
            background: rgba(255, 0, 255, 0.3);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.4);
        }

        .quantity-btn:active {
            transform: scale(0.9);
        }

        .quantity-input {
            width: 40px;
            text-align: center;
            padding: 4px 2px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ffff;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            border-radius: 6px;
            outline: none;
            -webkit-appearance: none;
            -moz-appearance: textfield;
        }

        .quantity-input::-webkit-inner-spin-button,
        .quantity-input::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .quantity-input:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 8px rgba(255, 0, 255, 0.3);
        }

        .admin-capsule-row.out-of-stock .quantity-control {
            opacity: 0.4;
        }

        /* Low stock notification */
        .low-stock-notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #ff8c00;
            border-radius: 12px;
            padding: 16px 20px;
            z-index: 10000;
            max-width: 480px;
            width: calc(100% - 40px);
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.3), 0 0 40px rgba(255, 140, 0, 0.1);
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { transform: translateX(-50%) translateY(100%); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }

        .low-stock-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .low-stock-title {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            color: #ff8c00;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .low-stock-close {
            background: none;
            border: none;
            color: #666;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
        }

        .low-stock-close:hover {
            color: #ff8c00;
        }

        .low-stock-items {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 14px;
            max-height: 200px;
            overflow-y: auto;
        }

        .low-stock-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Share Tech Mono', monospace;
            font-size: 13px;
            color: #ccc;
            padding: 4px 8px;
            background: rgba(255, 140, 0, 0.08);
            border-radius: 6px;
        }

        .low-stock-item-qty {
            color: #ff8c00;
            font-weight: bold;
        }

        .low-stock-link {
            display: block;
            text-align: center;
            padding: 10px;
            background: rgba(255, 140, 0, 0.15);
            border: 1px solid #ff8c00;
            border-radius: 8px;
            color: #ff8c00;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .low-stock-link:hover {
            background: rgba(255, 140, 0, 0.3);
            box-shadow: 0 0 10px rgba(255, 140, 0, 0.3);
        }

        /* Admin mobile */
        @media (max-width: 600px) {
            .admin-toolbar {
                flex-direction: column;
                position: static;
            }
            .pat-section {
                flex-direction: column;
                align-items: stretch;
            }
            .admin-actions {
                flex-wrap: wrap;
                justify-content: center;
            }
            .admin-capsule-row {
                flex-wrap: wrap;
                gap: 8px;
            }
            .admin-capsule-info {
                min-width: 100%;
            }
            .quantity-control {
                margin-right: auto;
                margin-left: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="theme-toggle" onclick="toggleTheme()">
                <span class="theme-toggle-icon">🌃</span>
                <div class="theme-toggle-switch"></div>
                <span class="theme-toggle-icon">🎨</span>
            </div>
            <h1>☕ KÁVÉ MENÜ</h1>
            <p class="subtitle">// Válassz, módosíts, élvezd //</p>
        </header>

        <div class="filters-section" id="filtersSection">
            <div class="filters-title" onclick="document.getElementById('filtersSection').classList.toggle('expanded')">🔍 Szűrők <span class="expand-icon">▼</span></div>

            <div class="filters-content">
            <div class="filter-group">
                <div class="filter-label">💊 Koffein</div>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="setFilter('caffeine', 'all', this)">Összes</button>
                    <button class="filter-btn" onclick="setFilter('caffeine', 'yes', this)">Koffeines</button>
                    <button class="filter-btn" onclick="setFilter('caffeine', 'no', this)">Koffeinmentes</button>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-label">☕ Csésze méret</div>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="setFilter('size', 'all', this)">Összes</button>
                    <button class="filter-btn" onclick="setFilter('size', '25', this)">Ristretto (25ml)</button>
                    <button class="filter-btn" onclick="setFilter('size', '40', this)">Espresso (40ml)</button>
                    <button class="filter-btn" onclick="setFilter('size', '80', this)">Double Espresso (80ml)</button>
                    <button class="filter-btn" onclick="setFilter('size', '150', this)">Gran Lungo (150ml)</button>
                    <button class="filter-btn" onclick="setFilter('size', '230', this)">Mug (230ml)</button>
                    <button class="filter-btn" onclick="setFilter('size', '355', this)">Alto (355ml)</button>
                    <button class="filter-btn" onclick="setFilter('size', '535', this)">Carafe (535ml)</button>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-label">⚡ Intenzitás</div>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="setFilter('intensity', 'all', this)">Összes</button>
                    <button class="filter-btn" onclick="setFilter('intensity', 'low', this)">Enyhe (1-5)</button>
                    <button class="filter-btn" onclick="setFilter('intensity', 'medium', this)">Közepes (6-8)</button>
                    <button class="filter-btn" onclick="setFilter('intensity', 'high', this)">Erős (9-13)</button>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-label">✨ Ízesítés</div>
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="setFilter('flavored', 'all', this)">Összes</button>
                    <button class="filter-btn" onclick="setFilter('flavored', 'yes', this)">Ízesített</button>
                    <button class="filter-btn" onclick="setFilter('flavored', 'no', this)">Natúr</button>
                </div>
            </div>
            </div>
        </div>

        <div class="view-toggle-bar">
            <button id="viewModeBtn" onclick="toggleViewMode()">🎡 Forgató nézet</button>
        </div>

        <div id="cardsContainer">
            <div id="coffeeList"></div>
        </div>
        <div class="rolodex-hint" id="rolodexHint" style="display:none;">↑ görget / húz ↓&nbsp;&nbsp;•&nbsp;&nbsp;kattints a megrendeléshez</div>
        <div class="rolodex-counter" id="rolodexCounter" style="display:none;"></div>
    </div>

    <!-- Admin PIN Modal -->
    <div id="pinModal" class="pin-modal" style="display: none;">
        <div class="pin-dialog">
            <h2 class="pin-title">ADMIN BELEPES</h2>
            <p class="pin-subtitle">Add meg a PIN kodot</p>
            <input type="password" id="pinInput" class="pin-input"
                   maxlength="6" inputmode="numeric" pattern="[0-9]*"
                   placeholder="****" autocomplete="off" />
            <div id="pinError" class="pin-error" style="display: none;">
                Hibas PIN kod!
            </div>
            <button class="pin-submit-btn" onclick="checkPin()">
                BELEPES
            </button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="adminPanel" class="admin-panel" style="display: none;">
        <div class="container">
            <header>
                <h1>ADMIN PANEL</h1>
                <p class="subtitle">// Keszlet kezeles //</p>
            </header>

            <div class="admin-toolbar">
                <div class="pat-section">
                    <label class="pat-label">GitHub PAT:</label>
                    <input type="password" id="patInput" class="pat-input"
                           placeholder="ghp_xxxxxxxxxxxx" autocomplete="off" />
                </div>
                <div class="admin-actions">
                    <span id="changeCount" class="change-count"></span>
                    <button id="saveBtn" class="save-btn" onclick="saveToGithub()" disabled>
                        MENTES
                    </button>
                    <button class="back-btn" onclick="window.location.href=window.location.pathname">
                        VISSZA
                    </button>
                </div>
            </div>

            <div id="adminCapsuleList"></div>
        </div>
    </div>

    <script>
        // ===== THEME TOGGLE =====
        function toggleTheme() {
            const isDoodle = document.body.classList.toggle('theme-doodle');
            localStorage.setItem('coffee-theme', isDoodle ? 'doodle' : 'cyberpunk');
        }
        // Apply saved theme on load
        (function() {
            if (localStorage.getItem('coffee-theme') === 'doodle') {
                document.body.classList.add('theme-doodle');
            }
        })();

        // Kávék adatai - inventory.json-ból töltjük be
        let coffees = [];

        // Kapszula cupSize → elérhető fekete kávé opciók (a gép valós képességei)
        const DRINK_OPTIONS_BY_CUP_SIZE = {
            25:  [{ id: 'ristretto', name: 'Ristretto (25ml)' }],
            40:  [{ id: 'espresso',  name: 'Espresso (40ml)' },
                  { id: 'ristretto', name: 'Ristretto (25ml)' }],
            80:  [{ id: 'double',    name: 'Double Espresso (80ml)' },
                  { id: 'espresso',  name: 'Espresso (40ml)' }],
            150: [{ id: 'granlungo', name: 'Gran Lungo (150ml)' },
                  { id: 'espresso',  name: 'Espresso (40ml)' }],
            230: [{ id: 'mug',       name: 'Mug (230ml)' },
                  { id: 'double',    name: 'Double Espresso (80ml)' }],
            355: [{ id: 'alto',      name: 'Alto (355ml)' }],
            535: [{ id: 'carafe',    name: 'Carafe (535ml)' }]
        };

        // Kompatibilis kapszulaméretek szűréshez: melyik szűrőmérethez mely cupSize-ok passzolnak
        const COMPATIBLE_CUP_SIZES = {};
        for (const [cupSize, drinks] of Object.entries(DRINK_OPTIONS_BY_CUP_SIZE)) {
            for (const drink of drinks) {
                const match = drink.name.match(/\((\d+)ml\)/);
                if (match) {
                    const drinkSize = parseInt(match[1]);
                    if (!COMPATIBLE_CUP_SIZES[drinkSize]) COMPATIBLE_CUP_SIZES[drinkSize] = new Set();
                    COMPATIBLE_CUP_SIZES[drinkSize].add(parseInt(cupSize));
                }
            }
        }

        // Tejes opciók — minden kapszulamérethez elérhetők
        const MILK_OPTIONS = [
            { id: 'cappuccino', name: 'Cappuccino', milk: true },
            { id: 'latte',      name: 'Latte',      milk: true },
            { id: 'flatwhite',  name: 'Flat White',  milk: true }
        ];

        // Specialty Coffee — saját elkészítési módok, nem kapszula
        const SPECIALTY_COFFEE = {
            id: 'specialty',
            name: 'Specialty Coffee',
            icon: '✨',
            intensity: null,
            description: 'Prémium, frissen őrölt specialty kávé — válaszd ki az elkészítési módot! Mindig elérhető, nem kapszulás.',
            size: 'Változó',
            cupSize: null,
            category: 'specialty',
            recommendations: [],
            tags: ['Specialty', 'Friss őrlés', 'Prémium'],
            flavored: false,
            caffeine: true,
            inStock: true,
            isSpecialty: true
        };

        const SPECIALTY_DRINK_OPTIONS = [
            { id: 'french-press',    name: 'French Press',    milk: false, noMilkSection: true },
            { id: 'cold-brew',       name: 'Cold Brew',       milk: false, noMilkSection: true },
            { id: 'filter',          name: 'Filter',          milk: false, noMilkSection: true },
            { id: 'espresso',        name: 'Espresso',        milk: false },
            { id: 'double-espresso', name: 'Double Espresso', milk: false },
            { id: 'cappuccino',      name: 'Cappuccino',      milk: true },
            { id: 'flatwhite',       name: 'Flat White',      milk: true }
        ];

        // Összes drink opció lekérdezése egy adott kapszulához
        function getDrinkOptions(coffee) {
            if (coffee.isSpecialty) return SPECIALTY_DRINK_OPTIONS;
            const cupSize = coffee.cupSize;
            const blackOptions = (DRINK_OPTIONS_BY_CUP_SIZE[cupSize] || []).map(o => ({...o, milk: false}));
            return [...blackOptions, ...MILK_OPTIONS];
        }

        function renderCoffees() {
            const container = document.getElementById('coffeeList');

            coffees.forEach((coffee, index) => {
                const card = document.createElement('div');
                card.className = 'coffee-card';
                card.id = `coffee-${index}`;

                const hasIntensity = coffee.intensity !== null && coffee.intensity !== undefined;
                const intensityStars = hasIntensity ? '⚡'.repeat(Math.min(coffee.intensity, 10)) : '';
                const intensityText = hasIntensity ? `Intenzitás: ${intensityStars} (${coffee.intensity}/13)` : (coffee.isSpecialty ? `☕ Frissen őrölt specialty` : `✨ Ízesített kapszula`);
                const tagsHTML = coffee.tags.map(tag => `<span class="tag">${tag}</span>`).join('');

                card.innerHTML = `
                    <div class="coffee-header" onclick="toggleCard(${index})">
                        <div class="coffee-icon">${coffee.icon}</div>
                        <div class="coffee-title">
                            <div class="coffee-name">${coffee.name}</div>
                            <div class="coffee-intensity">${intensityText}</div>
                        </div>
                        <div class="expand-icon">▼</div>
                    </div>

                    <div class="coffee-details">
                        <div class="coffee-description">
                            ${coffee.description}
                        </div>

                        <div class="tags">${tagsHTML}</div>

                        <div class="options-section">
                            <div class="option-group">
                                <div class="option-label">🥤 Kávé típus</div>
                                <div class="button-group" id="type-${index}">
                                    ${getDrinkOptions(coffee).map(opt => `
                                        <button class="option-btn" onclick="selectType(${index}, '${opt.id}')">
                                            ${opt.name}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>

                            <div class="option-group" id="milk-section-${index}">
                                <div class="option-label">🥛 Tej típusa</div>
                                <div class="button-group">
                                    <button class="option-btn" onclick="selectMilk(${index}, 'normal')">Normál tej</button>
                                    <button class="option-btn" onclick="selectMilk(${index}, 'oat')">Zab tej</button>
                                    <button class="option-btn" id="milk-none-btn-${index}" onclick="selectMilk(${index}, 'none')">Tej nélkül</button>
                                </div>
                            </div>

                            <div class="option-group" id="sweetener-section-${index}">
                                <div class="option-label">🍯 Édesítés</div>
                                <div class="button-group">
                                    <button class="option-btn" onclick="selectSweetener(${index}, 'yes')">Édesítővel</button>
                                    <button class="option-btn" onclick="selectSweetener(${index}, 'no')">Édesítő nélkül</button>
                                </div>
                            </div>

                            ${(!coffee.flavored && !coffee.isSpecialty) ? `
                            <div class="option-group" id="flavoring-section-${index}">
                                <div class="option-label">🍬 Ízesítés</div>
                                <div class="custom-dropdown" id="flavor-type-${index}">
                                    <button class="custom-dropdown-trigger" onclick="toggleDropdown(this)">-- Válassz --</button>
                                    <div class="custom-dropdown-menu">
                                        <div class="custom-dropdown-item" onclick="selectDropdownItem(this, 'sugar', 'Cukros'); selectFlavorType(${index}, 'sugar')">Cukros</div>
                                        <div class="custom-dropdown-item" onclick="selectDropdownItem(this, 'sugarfree', 'Cukormentes'); selectFlavorType(${index}, 'sugarfree')">Cukormentes</div>
                                    </div>
                                </div>
                                <div id="flavor-sub-${index}"></div>
                            </div>
                            ` : ''}

                            <div class="order-summary" id="summary-${index}" style="display: none;">
                                <div class="summary-title">⚡ A te választásod:</div>
                                <div id="summary-content-${index}"></div>
                            </div>

                            <textarea class="note-input" id="note-input-${index}" placeholder="📝 Egyéb kérés..." rows="2"></textarea>

                            <input type="text" class="name-input" id="name-input-${index}" placeholder="👤 Neved..." />

                            <button class="order-btn" id="order-btn-${index}" disabled onclick="placeOrder(${index})">
                                🚀 Megrendelem!
                            </button>
                        </div>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        const selections = {};

        function toggleCard(index) {
            if (rolodexActive) {
                const listPos = rolodexVisible.indexOf(index);
                if (listPos === -1) return;
                if (listPos === rolodexIdx) {
                    // Aktív kártya → lista nézetre váltás + kártya kinyitása
                    exitRolodex();
                    setTimeout(() => {
                        const card = document.getElementById(`coffee-${index}`);
                        if (card) {
                            card.classList.add('expanded');
                            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        }
                    }, 80);
                } else {
                    // Nem aktív kártya → navigálás hozzá
                    rolodexIdx = listPos;
                    positionRolodexCards();
                }
                return;
            }
            const card = document.getElementById(`coffee-${index}`);
            card.classList.toggle('expanded');
        }

        function selectType(coffeeIndex, typeId) {
            // Típus gombok frissítése
            const buttons = document.querySelectorAll(`#type-${coffeeIndex} .option-btn`);
            buttons.forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');

            // Mentés — név kikeresése az aktuális kapszula opcióiból
            if (!selections[coffeeIndex]) selections[coffeeIndex] = {};
            const coffee = coffees[coffeeIndex];
            const allOptions = getDrinkOptions(coffee);
            const selectedOption = allOptions.find(o => o.id === typeId);
            selections[coffeeIndex].type = selectedOption ? selectedOption.name : typeId;
            selections[coffeeIndex].typeId = typeId;

            // Specialty: egyes opciók (French Press, Cold Brew, Filter) tej nélküliek — teljes tej szekció rejtése
            const milkSection = document.getElementById(`milk-section-${coffeeIndex}`);
            const milkNoneBtn = document.getElementById(`milk-none-btn-${coffeeIndex}`);
            const milkBtns = milkSection.querySelectorAll('.option-btn');
            const isNoMilkOption = selectedOption && selectedOption.noMilkSection;

            if (isNoMilkOption) {
                // Tej szekció teljes elrejtése, automatikusan "Tej nélkül"
                milkSection.style.display = 'none';
                selections[coffeeIndex].milk = 'Tej nélkül';
                milkBtns.forEach(btn => btn.classList.remove('selected'));
                updateSummary(coffeeIndex);
                return;
            }

            // Tej szekció megjelenítése (ha korábban el volt rejtve)
            milkSection.style.display = '';

            // Tej logika: tejes italnál "Tej nélkül" rejtve, feketéknél "Tej nélkül" automatikus
            const isMilkDrink = selectedOption && selectedOption.milk;

            if (isMilkDrink) {
                // Tejes ital: "Tej nélkül" gomb elrejtése
                milkNoneBtn.style.display = 'none';
                // Ha korábban "Tej nélkül" volt kiválasztva, töröljük
                if (!selections[coffeeIndex].milk || selections[coffeeIndex].milk === 'Tej nélkül') {
                    delete selections[coffeeIndex].milk;
                    milkBtns.forEach(btn => btn.classList.remove('selected'));
                }
            } else {
                // Fekete kávé: "Tej nélkül" gomb látható és automatikusan kijelölve
                milkNoneBtn.style.display = '';
                selections[coffeeIndex].milk = 'Tej nélkül';
                milkBtns.forEach(btn => btn.classList.remove('selected'));
                milkNoneBtn.classList.add('selected');
            }

            updateSummary(coffeeIndex);
        }

        function selectMilk(coffeeIndex, milkType) {
            const buttons = document.querySelectorAll(`#milk-section-${coffeeIndex} .option-btn`);
            buttons.forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');

            if (!selections[coffeeIndex]) selections[coffeeIndex] = {};
            const milkNames = {
                'normal': 'Normál tej',
                'oat': 'Zab tej',
                'none': 'Tej nélkül'
            };
            selections[coffeeIndex].milk = milkNames[milkType];

            updateSummary(coffeeIndex);
        }


        function selectSweetener(coffeeIndex, sweetenerType) {
            const buttons = document.querySelectorAll(`#sweetener-section-${coffeeIndex} .option-btn`);
            buttons.forEach(btn => btn.classList.remove('selected'));
            event.target.classList.add('selected');

            if (!selections[coffeeIndex]) selections[coffeeIndex] = {};
            const sweetenerNames = {
                'yes': 'Édesítővel',
                'no': 'Édesítő nélkül'
            };
            selections[coffeeIndex].sweetener = sweetenerNames[sweetenerType];

            updateSummary(coffeeIndex);
        }

        const FLAVOR_OPTIONS = {
            sugar: {
                label: 'Cukros',
                items: [
                    { id: 'karamellas', name: 'Karamell (szirup)' }
                ]
            },
            sugarfree: {
                label: 'Cukormentes',
                subcategories: {
                    syrup: {
                        label: 'Szirup',
                        items: [
                            { id: 'karamell-szirup', name: 'Karamell' },
                            { id: 'vanilla-szirup', name: 'Vanília' },
                            { id: 'mogyoro-szirup', name: 'Mogyoró' }
                        ]
                    },
                    drops: {
                        label: 'Cseppek',
                        items: [
                            { id: 'etcsoki-csepp', name: 'Étcsoki' },
                            { id: 'karamell-csepp', name: 'Karamell' },
                            { id: 'kokusz-macaron-csepp', name: 'Kókusz-macaron' }
                        ]
                    }
                }
            }
        };

        function toggleDropdown(trigger) {
            const dropdown = trigger.closest('.custom-dropdown');
            const wasOpen = dropdown.classList.contains('open');
            // Összes dropdown bezárása
            document.querySelectorAll('.custom-dropdown.open').forEach(d => d.classList.remove('open'));
            if (!wasOpen) dropdown.classList.add('open');
        }

        function selectDropdownItem(item, value, label) {
            const dropdown = item.closest('.custom-dropdown');
            const trigger = dropdown.querySelector('.custom-dropdown-trigger');
            trigger.textContent = label;
            dropdown.querySelectorAll('.custom-dropdown-item').forEach(i => i.classList.remove('selected'));
            item.classList.add('selected');
            dropdown.classList.remove('open');
            dropdown.dataset.value = value;
        }

        // Kattintás kívülre → dropdown bezárása
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.custom-dropdown')) {
                document.querySelectorAll('.custom-dropdown.open').forEach(d => d.classList.remove('open'));
            }
        });

        function buildDropdownHTML(id, placeholder, options, onSelectFn) {
            const items = options.map(o =>
                `<div class="custom-dropdown-item" onclick="selectDropdownItem(this, '${o.value}', '${o.label}'); ${onSelectFn}('${o.value}')">${o.label}</div>`
            ).join('');
            return `<div class="custom-dropdown" id="${id}">
                <button class="custom-dropdown-trigger" onclick="toggleDropdown(this)">${placeholder}</button>
                <div class="custom-dropdown-menu">${items}</div>
            </div>`;
        }

        function selectFlavorType(coffeeIndex, value) {
            if (!selections[coffeeIndex]) selections[coffeeIndex] = {};
            const subContainer = document.getElementById(`flavor-sub-${coffeeIndex}`);
            subContainer.innerHTML = '';
            delete selections[coffeeIndex].flavoring;

            if (value === 'sugar') {
                const items = FLAVOR_OPTIONS.sugar.items;
                const options = items.map(i => ({ value: i.name, label: i.name }));
                subContainer.innerHTML = `
                    <div class="flavor-sub-group">
                        <div class="flavor-sub-label">Íz</div>
                        ${buildDropdownHTML(`flavor-sugar-${coffeeIndex}`, '-- Válassz ízt --', options,
                            `(function(v){ selectFlavorItem(${coffeeIndex}, 'Cukros', v) })`)}
                    </div>
                `;
            } else if (value === 'sugarfree') {
                subContainer.innerHTML = `
                    <div class="flavor-sub-group">
                        <div class="flavor-sub-label">Típus</div>
                        ${buildDropdownHTML(`flavor-sftype-${coffeeIndex}`, '-- Válassz típust --',
                            [{value: 'syrup', label: 'Szirup'}, {value: 'drops', label: 'Cseppek'}],
                            `(function(v){ selectSugarFreeType(${coffeeIndex}, v) })`)}
                        <div id="flavor-sf-sub-${coffeeIndex}"></div>
                    </div>
                `;
            }
            updateSummary(coffeeIndex);
        }

        function selectSugarFreeType(coffeeIndex, value) {
            if (!selections[coffeeIndex]) selections[coffeeIndex] = {};
            delete selections[coffeeIndex].flavoring;
            const subContainer = document.getElementById(`flavor-sf-sub-${coffeeIndex}`);
            subContainer.innerHTML = '';

            if (value && FLAVOR_OPTIONS.sugarfree.subcategories[value]) {
                const cat = FLAVOR_OPTIONS.sugarfree.subcategories[value];
                const options = cat.items.map(i => ({ value: i.name, label: i.name }));
                subContainer.innerHTML = `
                    <div class="flavor-sub-group">
                        <div class="flavor-sub-label">${cat.label}</div>
                        ${buildDropdownHTML(`flavor-sfitem-${coffeeIndex}`, '-- Válassz ízt --', options,
                            `(function(v){ selectFlavorItem(${coffeeIndex}, 'Cukormentes ${cat.label.toLowerCase()}', v) })`)}
                    </div>
                `;
            }
            updateSummary(coffeeIndex);
        }

        function selectFlavorItem(coffeeIndex, category, value) {
            if (!selections[coffeeIndex]) selections[coffeeIndex] = {};
            if (value) {
                selections[coffeeIndex].flavoring = `${category}: ${value}`;
            } else {
                delete selections[coffeeIndex].flavoring;
            }
            updateSummary(coffeeIndex);
        }

        function updateSummary(coffeeIndex) {
            const selection = selections[coffeeIndex];
            const summary = document.getElementById(`summary-${coffeeIndex}`);
            const content = document.getElementById(`summary-content-${coffeeIndex}`);
            const orderBtn = document.getElementById(`order-btn-${coffeeIndex}`);

            if (selection && selection.type) {
                summary.style.display = 'block';

                let html = `<div class="summary-item">☕ ${selection.type}</div>`;

                const isMilkDrink = selection.typeId && MILK_OPTIONS.some(m => m.id === selection.typeId);

                if (selection.milk) {
                    html += `<div class="summary-item">🥛 ${selection.milk}</div>`;

        // Szűrő logika
        const activeFilters = { caffeine: 'all', size: 'all', intensity: 'all', flavored: 'all' };

        function setFilter(filterType, value, btnElement) {
            activeFilters[filterType] = value;

            // Gomb állapot frissítése a csoporton belül
            const buttons = btnElement.parentElement.querySelectorAll('.filter-btn');

        function applyFilters() {
            coffees.forEach((coffee, index) => {
                const card = document.getElementById(`coffee-${index}`);
                if (!card) return;

                let visible = true;

                // Specialty Coffee: szűrők vonatkoznak rá (koffeines, nincs fix méret/intenzitás)
                if (coffee.isSpecialty) {
                    let specialtyVisible = true;
                    if (activeFilters.caffeine === 'no') specialtyVisible = false;
                    if (activeFilters.size !== 'all') specialtyVisible = false;
                    if (activeFilters.intensity !== 'all') specialtyVisible = false;
                    if (activeFilters.flavored === 'yes') specialtyVisible = false;
                    card.classList.toggle('hidden', !specialtyVisible);
                    return;
                }

                // Koffein szűrés
                if (activeFilters.caffeine !== 'all') {
                    if (activeFilters.caffeine === 'yes') {
                        visible = visible && coffee.caffeine;
                    } else if (activeFilters.caffeine === 'no') {
                        visible = visible && !coffee.caffeine;
                    }
                }

                // Csésze méret szűrés (cupSize + kompatibilis méretek)
                if (activeFilters.size !== 'all') {
                    const filterSize = parseInt(activeFilters.size);
                    const compatibleSizes = COMPATIBLE_CUP_SIZES[filterSize];
                    visible = visible && (compatibleSizes ? compatibleSizes.has(coffee.cupSize) : coffee.cupSize === filterSize);
                }

                // Intenzitás szűrés (null intenzitású ízesített kapszulák nem jelennek meg intenzitás szűrésnél)
                if (activeFilters.intensity !== 'all') {
                    if (coffee.intensity === null || coffee.intensity === undefined) {
                        visible = false;
                    } else if (activeFilters.intensity === 'low') {
                        visible = visible && (coffee.intensity >= 1 && coffee.intensity <= 5);
                    } else if (activeFilters.intensity === 'medium') {
                        visible = visible && (coffee.intensity >= 6 && coffee.intensity <= 8);
                    } else if (activeFilters.intensity === 'high') {
                        visible = visible && (coffee.intensity >= 9 && coffee.intensity <= 13);
                    }
                }

                // Ízesítés szűrés
                if (activeFilters.flavored !== 'all') {
                    if (activeFilters.flavored === 'yes') {
                        visible = visible && coffee.flavored;
                    } else if (activeFilters.flavored === 'no') {
                        visible = visible && !coffee.flavored;
                    }
                }

                if (visible) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });

            // Rolodex frissítése szűrés után
            if (rolodexActive) positionRolodexCards();

        // ===== ROLODEX MÓD =====

        function getRolodexVisible() {
            const result = [];
            coffees.forEach((c, i) => {

                if (card && !card.classList.contains('hidden')) result.push(i);

        function toggleViewMode() {

        function enterRolodex() {
            rolodexActive = true;

            rolodexIdx = Math.max(0, Math.min(rolodexIdx, rolodexVisible.length - 1));

            const btn = document.getElementById('viewModeBtn');
            const list = document.getElementById('coffeeList');

            btn.textContent = '☰ Lista nézet';

        function exitRolodex() {
            rolodexActive = false;

            const btn = document.getElementById('viewModeBtn');
            const list = document.getElementById('coffeeList');
            const container = document.getElementById('cardsContainer');

            btn.textContent = '🎡 Forgató nézet';

            container.classList.remove('rolodex-mode');
            document.getElementById('rolodexHint').style.display = 'none';
            document.getElementById('rolodexCounter').style.display = 'none';

            // Kártyák stílusainak törlése
            coffees.forEach((c, i) => {
                const card = document.getElementById(`coffee-${i}`);
                if (!card) return;
                card.style.cssText = '';
                card.classList.remove('rolodex-active');
            });

            detachRolodexEvents();
        }

        function positionRolodexCards() {
            if (!rolodexActive) return;

            rolodexVisible = getRolodexVisible();
            rolodexIdx = Math.max(0, Math.min(rolodexIdx, rolodexVisible.length - 1));

            // Frissítjük a számlálót
            const counter = document.getElementById('rolodexCounter');
            if (counter) counter.textContent = `${rolodexIdx + 1} / ${rolodexVisible.length}`;

            // Összes kártya elrejtése alapból
            coffees.forEach((c, i) => {
                const card = document.getElementById(`coffee-${i}`);
                if (!card) return;
                card.style.display = 'none';
                card.classList.remove('rolodex-active');
            });

            const CARD_H = 110;   // becsült magasság
            const PEEK   = 36;    // hány px látszik a szomszédból
            const MAX_VIS = 2;    // ±2 szomszéd

            const len = rolodexVisible.length;

            rolodexVisible.forEach((coffeeIdx, listPos) => {
                const card = document.getElementById(`coffee-${coffeeIdx}`);
                if (!card) return;

                // Körbeforgó offset: legrövidebb útvonal a körön
                let offset = listPos - rolodexIdx;
                if (offset > len / 2)  offset -= len;
                if (offset < -len / 2) offset += len;
                const abs = Math.abs(offset);

                if (abs > MAX_VIS) { card.style.display = 'none'; return; }

                card.style.display = '';
                card.style.position  = 'absolute';
                card.style.left      = '0';
                card.style.width     = '100%';
                card.style.boxSizing = 'border-box';
                card.style.margin    = '0';
                card.style.top       = '50%';

                if (offset === 0) {
                    card.style.transform  = 'translateY(-50%) rotateX(0deg) scale(1)';
                    card.style.opacity    = '1';
                    card.style.zIndex     = '20';
                    card.classList.add('rolodex-active');
                } else {
                    const sign     = Math.sign(offset);
                    // szomszéd pozíció: aktív kártya félig + PEEK * szint
                    const shift    = sign * (CARD_H * 0.5 + abs * PEEK);
                    const rotX     = -sign * Math.min(abs * 16, 48);
                    const scale    = Math.max(0.72, 1 - abs * 0.1);
                    const opacity  = Math.max(0.12, 1 - abs * 0.3);

                    card.style.transform = `translateY(calc(-50% + ${shift}px)) rotateX(${rotX}deg) scale(${scale})`;
                    card.style.opacity   = String(opacity);
                    card.style.zIndex    = String(20 - abs * 3);
                }
            });
        }

        function rolodexNavigate(delta) {
            const len = rolodexVisible.length;
            if (len === 0) return;
            // Körkörös navigáció: az utolsó után az első jön, és fordítva
            rolodexIdx = ((rolodexIdx + delta) % len + len) % len;
            positionRolodexCards();
        }

        function onRolodexWheel(e) {
            e.preventDefault();
            if (rolodexScrollLock) return;
            rolodexScrollLock = true;
            rolodexNavigate(e.deltaY > 0 ? 1 : -1);
            setTimeout(() => { rolodexScrollLock = false; }, 380);
        }

        function onRolodexTouchStart(e) {
            rolodexTouchStartY = e.touches[0].clientY;
        }

        function onRolodexTouchMove(e) {
            e.preventDefault();
            const dy = rolodexTouchStartY - e.touches[0].clientY;
            if (Math.abs(dy) >= 60) {
                rolodexNavigate(dy > 0 ? 1 : -1);
                rolodexTouchStartY = e.touches[0].clientY;
            }
        }

        function onRolodexTouchEnd(e) {
            const dy = rolodexTouchStartY - e.changedTouches[0].clientY;
            if (Math.abs(dy) > 20) rolodexNavigate(dy > 0 ? 1 : -1);
        }

        function attachRolodexEvents() {
            const list = document.getElementById('coffeeList');
            list.addEventListener('wheel', onRolodexWheel, { passive: false });
            list.addEventListener('touchstart', onRolodexTouchStart, { passive: true });
            list.addEventListener('touchmove', onRolodexTouchMove, { passive: false });
            list.addEventListener('touchend', onRolodexTouchEnd, { passive: true });
        }

        function detachRolodexEvents() {
            const list = document.getElementById('coffeeList');
            list.removeEventListener('wheel', onRolodexWheel);
            list.removeEventListener('touchstart', onRolodexTouchStart);
            list.removeEventListener('touchmove', onRolodexTouchMove);
            list.removeEventListener('touchend', onRolodexTouchEnd);
        }

        function toggleStock(capsuleId, isChecked) {
            currentStockState[capsuleId] = isChecked;

            if (isChecked && currentQuantityState[capsuleId] === 0) {
                currentQuantityState[capsuleId] = 1;
            } else if (!isChecked) {
                currentQuantityState[capsuleId] = 0;
            }

            const qtyInput = document.getElementById(`qty-${capsuleId}`);
            if (qtyInput) qtyInput.value = currentQuantityState[capsuleId];

            const row = document.getElementById(`admin-row-${capsuleId}`);
            if (row) {
                row.classList.toggle('out-of-stock', !isChecked);
            }

            updateChangeCount();
        }

        function changeQuantity(capsuleId, delta) {
            let qty = (currentQuantityState[capsuleId] || 0) + delta;
            qty = Math.max(0, Math.min(99, qty));
            currentQuantityState[capsuleId] = qty;
            currentStockState[capsuleId] = qty > 0;

            const qtyInput = document.getElementById(`qty-${capsuleId}`);
            if (qtyInput) qtyInput.value = qty;

            const toggle = document.getElementById(`toggle-${capsuleId}`);
            if (toggle) toggle.checked = qty > 0;

            const row = document.getElementById(`admin-row-${capsuleId}`);
            if (row) row.classList.toggle('out-of-stock', qty === 0);

            updateChangeCount();
        }

        function setQuantity(capsuleId, value) {
            let qty = parseInt(value) || 0;
            qty = Math.max(0, Math.min(99, qty));
            currentQuantityState[capsuleId] = qty;
            currentStockState[capsuleId] = qty > 0;

            const qtyInput = document.getElementById(`qty-${capsuleId}`);
            if (qtyInput) qtyInput.value = qty;

            const toggle = document.getElementById(`toggle-${capsuleId}`);
            if (toggle) toggle.checked = qty > 0;

            const row = document.getElementById(`admin-row-${capsuleId}`);
            if (row) row.classList.toggle('out-of-stock', qty === 0);

            updateChangeCount();
        }

        function updateChangeCount() {
            let changes = 0;
            Object.keys(originalStockState).forEach(id => {
                if (originalStockState[id] !== currentStockState[id] ||
                    originalQuantityState[id] !== currentQuantityState[id]) changes++;
            });

            const countEl = document.getElementById('changeCount');
            const saveBtn = document.getElementById('saveBtn');
            const patInput = document.getElementById('patInput');

            countEl.textContent = changes > 0 ? `${changes} valtozas` : '';
            saveBtn.disabled = changes === 0 || patInput.value.trim() === '';

            // Update category header stats
            const grouped = {};
            allCapsules.forEach(c => {
                if (!grouped[c.category]) grouped[c.category] = [];
                grouped[c.category].push(c);
            });
            Object.keys(grouped).forEach(catKey => {
                const el = document.getElementById(`cat-stats-${catKey}`);
                if (!el) return;
                const capsules = grouped[catKey];
                const inStockCount = capsules.filter(c => currentStockState[c.id]).length;
                const totalQty = capsules.reduce((sum, c) => sum + (currentQuantityState[c.id] || 0), 0);
                el.textContent = `(${totalQty} db / ${inStockCount} fajta)`;
