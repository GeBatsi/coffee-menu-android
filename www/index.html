                return;
            }

            saveBtn.disabled = true;
            saveBtn.textContent = 'MENTES...';
            saveBtn.className = 'save-btn saving';

            try {
                // GET current file SHA
                const getResponse = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}`,
                    {
                        headers: {
                            'Authorization': `Bearer ${pat}`,
                            'Accept': 'application/vnd.github.v3+json'
                        }
                    }
                );

                if (!getResponse.ok) {
                    const errData = await getResponse.json().catch(() => ({}));
                    throw new Error(
                        getResponse.status === 401
                            ? 'Ervenytelen PAT token!'
                            : `GitHub hiba: ${getResponse.status} - ${errData.message || ''}`
                    );
                }

                const fileData = await getResponse.json();
                const currentSha = fileData.sha;

                // Build updated inventory
                const updatedCapsules = allCapsules.map(c => ({
                    ...c,
                    inStock: currentQuantityState[c.id] > 0,
                    quantity: currentQuantityState[c.id] || 0
                }));

                const updatedInventory = {
                    lastUpdated: new Date().toISOString(),
                    capsules: updatedCapsules
                };

                const jsonString = JSON.stringify(updatedInventory, null, 2) + '\n';
                const base64Content = btoa(unescape(encodeURIComponent(jsonString)));

                // PUT updated file
                const putResponse = await fetch(
                    `https://api.github.com/repos/${GITHUB_REPO}/contents/${GITHUB_FILE_PATH}`,
                    {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${pat}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: 'Update inventory stock (admin panel)',
                            content: base64Content,
                            sha: currentSha
                        })
                    }
                );

                if (!putResponse.ok) {
                    const errData = await putResponse.json().catch(() => ({}));
                    throw new Error(`Mentes sikertelen: ${putResponse.status} - ${errData.message || ''}`);
                }

                // Success
                saveBtn.textContent = 'MENTVE!';
                saveBtn.className = 'save-btn saved';

                Object.keys(currentStockState).forEach(id => {
                    originalStockState[id] = currentStockState[id];
                    originalQuantityState[id] = currentQuantityState[id];
                });
                updateChangeCount();
                renderAdminPanel();

                // Check for low stock capsules
                checkLowStockAndAddToCart();

                setTimeout(() => {
                    saveBtn.textContent = 'MENTES';
                    saveBtn.className = 'save-btn';
                }, 3000);

            } catch (error) {
                console.error('GitHub save error:', error);
                saveBtn.textContent = 'HIBA!';
                saveBtn.className = 'save-btn error';
                alert(error.message);

                setTimeout(() => {
                    saveBtn.textContent = 'MENTES';
                    saveBtn.className = 'save-btn';
                    saveBtn.disabled = false;
                }, 3000);
            }
        }

        function checkLowStockAndAddToCart() {
            const LOW_STOCK_THRESHOLD = 4;
            const lowStockCapsules = allCapsules.filter(c =>
                currentQuantityState[c.id] > 0 &&
                currentQuantityState[c.id] < LOW_STOCK_THRESHOLD &&
                c.nespressoSku
            );

            if (lowStockCapsules.length === 0) return;

            showLowStockNotification(lowStockCapsules);
        }

        function buildNespressoCartHash(capsules) {
            const lines = capsules.map(c => ({
                item: `erp.hu.b2c/prod/${c.nespressoSku}`,
                quantity: c.cupSize >= 535 ? 7 : 10
            }));
            return '#coffee-cart=' + btoa(encodeURIComponent(JSON.stringify(lines)));
        }

        function getNespressoCartUrl(capsules) {
            const hash = buildNespressoCartHash(capsules);
            return 'https://www.nespresso.com/hu/hu/order/capsules/vertuo' + hash;
        }

        function showUserscriptSetup() {
            const existing = document.querySelector('.userscript-setup-modal');
            if (existing) existing.remove();

            const modal = document.createElement('div');
            modal.className = 'userscript-setup-modal';
            modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);z-index:100000;display:flex;align-items:center;justify-content:center;padding:20px;';
            modal.innerHTML = `
                <div style="background:#1a1a2e;border:1px solid #ff8c00;border-radius:12px;padding:28px;max-width:520px;width:100%;color:#fff;font-family:'Share Tech Mono',monospace;position:relative;">
                    <button onclick="this.closest('.userscript-setup-modal').remove()" style="position:absolute;top:12px;right:16px;background:none;border:none;color:#888;font-size:20px;cursor:pointer;">✕</button>
                    <h3 style="color:#ff8c00;margin:0 0 16px;font-family:'Orbitron',sans-serif;font-size:16px;">⚙ Egyszeri beállítás</h3>
                    <p style="font-size:13px;color:#ccc;line-height:1.6;margin:0 0 16px;">
                        Az automatikus Nespresso kosár funkcióhoz egy böngésző-kiegészítő szükséges.<br>
                        <strong style="color:#ff8c00;">Ezt csak egyszer kell megcsinálni!</strong>
                    </p>
                    <div style="background:#0d0d1a;border-radius:8px;padding:16px;font-size:12px;line-height:2;">
                        <div><span style="color:#ff8c00;">①</span> Telepítsd a <a href="https://www.tampermonkey.net/" target="_blank" style="color:#0ff;text-decoration:underline;">Tampermonkey</a> bővítményt</div>
                        <div><span style="color:#ff8c00;">②</span> <a href="nespresso-cart-helper.js" target="_blank" style="color:#0ff;text-decoration:underline;">Kattints ide a script telepítéséhez</a></div>
                        <div><span style="color:#ff8c00;">③</span> Kattints az "Install" gombra a Tampermonkey-ban</div>
                        <div><span style="color:#ff8c00;">④</span> Kész! Ezután minden automatikus.</div>
                    </div>
                    <div style="margin-top:16px;text-align:center;">
                        <button onclick="localStorage.setItem('nespresso-helper-installed','1');this.closest('.userscript-setup-modal').remove();" style="background:linear-gradient(135deg,#ff8c00,#ff6600);border:none;color:#fff;padding:10px 24px;border-radius:6px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:13px;">MÁR TELEPÍTETTEM ✓</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function showLowStockNotification(capsules) {
            const existing = document.querySelector('.low-stock-notification');
            if (existing) existing.remove();

            window._lowStockCapsules = capsules;

            const itemsHtml = capsules.map(c => {
                const qty = currentQuantityState[c.id];
                const sleeve = c.cupSize >= 535 ? 7 : 10;
                return `<div class="low-stock-item">
                    <span>${c.icon} ${c.name}</span>
                    <span class="low-stock-item-qty">${qty} db → +${sleeve} rendelés</span>
                </div>`;
            }).join('');

            const helperInstalled = localStorage.getItem('nespresso-helper-installed');
            const nespressoUrl = helperInstalled ? getNespressoCartUrl(capsules) : '#';

            const notification = document.createElement('div');
            notification.className = 'low-stock-notification';
            notification.innerHTML = `
                <div class="low-stock-header">
                    <span class="low-stock-title">⚠ Alacsony készlet</span>
                    <button class="low-stock-close" onclick="this.closest('.low-stock-notification').remove()">✕</button>
                </div>
                <div class="low-stock-items">${itemsHtml}</div>
                ${helperInstalled
                    ? `<a href="${nespressoUrl}" target="_blank" class="low-stock-link low-stock-copy-btn" style="text-decoration:none;display:block;text-align:center;">🛒 AUTOMATIKUS KOSÁRBA RAKÁS</a>
                       <div style="text-align:center;font-size:11px;color:#888;margin-top:6px;">Megnyitja a Nespresso-t és automatikusan hozzáadja a tételeket</div>`
                    : `<button class="low-stock-link low-stock-copy-btn" onclick="showUserscriptSetup()">⚙ BEÁLLÍTÁS SZÜKSÉGES</button>
                       <div style="text-align:center;font-size:11px;color:#888;margin-top:6px;">Egyszeri beállítás az automatikus rendeléshez</div>`
                }
            `;

            document.body.appendChild(notification);

            setTimeout(() => {
                if (notification.parentNode) {
                    notification.style.animation = 'slideUp 0.3s ease reverse';
                    setTimeout(() => notification.remove(), 300);
                }
            }, 30000);
        }

        initAdmin();
    </script>
</body>
</html>
